<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>数学学習ノート</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
:root {
  --bg: #ffffff;
  --card: #ffffff;
  --text: #202124;
  --line: #e0e0e0;

  --blue: #4285f4;
  --blue-light: #e8f0fe;

  --yellow: #fbbc05;
  --yellow-light: #fff3c4;
  --cream: #fffaf0;

  --green: #34a853;
  --green-light: #e6f4ea;

  --red: #ea4335;
  --red-light: #fde8e6;
}

body {
  margin: 0;
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.85;
}

.container {
  width: min(1080px, 92%);
  margin: 0 auto;
  padding: 32px 0 64px;
}

/* セクション */
section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 24px;
}

section h2 {
  color: var(--blue);
  border-bottom: 2px solid #ececec;
  padding-bottom: 10px;
}

/* 共通BOX */
.box {
  border-radius: 14px;
  padding: 18px;
  margin: 18px 0;
  border: 1px solid var(--line);
}

/* 🔥 見出し（ここが今回の本体） */
.box-header {
  display: flex;
  gap: 12px;
  align-items: baseline;
  margin-bottom: 10px;
}

.label {
  font-weight: bold;
  font-size: 1.2rem;
}

.title {
  font-weight: bold;
  font-size: 1.2rem;
}

/* 定義 */
.definition {
  background: var(--blue-light);
  border-left: 6px solid var(--blue);
}
.definition .label { color: var(--blue); }

/* 定理系 */
.theorem,
.proposition,
.lemma,
.corollary {
  background: var(--yellow-light);
  border-left: 6px solid var(--yellow);
}
.theorem .label,
.proposition .label,
.lemma .label,
.corollary .label {
  color: #b7791f;
}

/* 証明 */
details.proof {
  background: var(--cream);
  border-radius: 14px;
  margin: 16px 0;
}
details.proof summary {
  padding: 14px;
  cursor: pointer;
  font-weight: bold;
}

/* 例 */
details.example {
  background: var(--green-light);
  border-radius: 14px;
  margin: 16px 0;
}
details.example summary {
  padding: 14px;
  cursor: pointer;
  font-weight: bold;
  color: var(--green);
}

/* まとめ */
.summary-box {
  background: var(--red-light);
  border-left: 6px solid var(--red);
}
.summary-box .label { color: var(--red); }

</style>
</head>

<body>
<div class="container">

<section>

<h2>時空の概念</h2>

<!-- 定義 -->
<div class="box definition">
  <div class="box-header">
    <span class="label">定義</span>
    <span class="title">時空</span>
  </div>

  <p>4次元多様体 \(M\) にローレンツ計量 \(g\) を入れた組 \((M,g)\)</p>
</div>

<!-- 定義 -->
<div class="box definition">
  <div class="box-header">
    <span class="label">定義</span>
    <span class="title">計量テンソル</span>
  </div>

  <p>\(g(v,v)\) によってベクトルの分類が決まる</p>
</div>

<!-- 定理 -->
<div class="box theorem">
  <div class="box-header">
    <span class="label">定理</span>
    <span class="title">因果的分類</span>
  </div>

  <p>\(g(v,v)\) の符号で分類される</p>
</div>

<!-- 証明 -->
<details class="proof">
  <summary>証明</summary>
  <div style="padding:16px;">
    <p>ローレンツ計量の符号構造から従う</p>
  </div>
</details>

<!-- 例 -->
<details class="example">
  <summary>例：ミンコフスキー時空</summary>
  <div style="padding:16px;">
    <p>\(ds^2=-dt^2+dx^2+dy^2+dz^2\)</p>
  </div>
</details>

<!-- まとめ -->
<div class="box summary-box">
  <div class="box-header">
    <span class="label">まとめ</span>
    <span class="title">時空の構造</span>
  </div>

  <p>符号によって時間・光・空間が分かれる</p>
</div>

</section>

</div>
</body>
</html>
